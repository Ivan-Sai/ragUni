name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Cancel superseded runs on the same branch so a push squashes the
# previous in-flight job instead of queuing behind it.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — pytest + coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Dedicated non-production values. The backend validates that
      # SECRET_KEY is >= 32 chars and not a "change-me" placeholder.
      SECRET_KEY: ci-secret-key-for-testing-only-do-not-reuse-anywhere
      DEEPSEEK_API_KEY: ci-deepseek-stub
      MONGODB_URL: mongodb://localhost:27017
      MONGODB_DB_NAME: ci
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libmagic1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=xml --cov-report=term -v

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 14

  frontend:
    name: Frontend — lint + build + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      # Build-time values used by Next.js. `NEXT_PUBLIC_API_URL` is
      # inlined into the bundle, so it must be present here.
      NEXT_PUBLIC_API_URL: http://localhost:8000
      AUTH_SECRET: ci-auth-secret-for-testing-only
      AUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:run

      - name: Build
        run: npm run build

  docs:
    name: Docs — required files present
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify defense-critical docs exist
        run: |
          for f in docs/ARCHITECTURE.md docs/EVALUATION.md docs/DEPLOYMENT.md; do
            test -f "$f" || { echo "Missing required doc: $f"; exit 1; }
          done
